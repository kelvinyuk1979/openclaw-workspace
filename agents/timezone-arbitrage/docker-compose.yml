version: '3.8'

services:
  agent:
    build: .
    container_name: timezone-arbitrage-agent
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - POLYMARKET_API_KEY=${POLYMARKET_API_KEY}
      - POLYMARKET_API_SECRET=${POLYMARKET_API_SECRET}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - arbitrage-network
  
  postgres:
    image: postgres:15-alpine
    container_name: timezone-arbitrage-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=timezone_arbitrage
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - arbitrage-network
    ports:
      - "5432:5432"
  
  redis:
    image: redis:7-alpine
    container_name: timezone-arbitrage-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - arbitrage-network
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  redis-data:

networks:
  arbitrage-network:
    driver: bridge
